---
# Standalone playbook: creates the fivin sudo user on a device. Run this
# once, as root (or whatever account you first land on), BEFORE
# site.yml. site.yml itself is meant to be run afterward AS the admin
# user this playbook creates — not as root. See README.md.
#
#   ansible-playbook users/fivin.yml -e fivin_ssh_public_key="ssh-ed25519 AAAA... you@host"
#
# Deliberately separate from site.yml/vars/profiles.yml: different
# devices may end up wanting different admin-user setups, and user
# creation is a one-time bootstrap step, not part of the repeatable
# per-device role list.
- name: Create the fivin sudo user
  hosts: localhost
  connection: local
  gather_facts: true
  roles:
    - fivin
