---
# Companion to fivin.yml. roles/fivin/tasks/uninstall.yml deliberately
# fails loudly with manual removal instructions rather than actually
# removing the account — see AGENT.md/README.md for why.
- name: Uninstall the fivin sudo user
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Uninstall fivin role
      ansible.builtin.include_role:
        name: fivin
        tasks_from: uninstall.yml
