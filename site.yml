---
- name: Provision this device
  hosts: localhost
  connection: local
  gather_facts: true
  vars_files:
    - vars/profiles.yml
  vars:
    # ansible_env.HOME (the bare top-level fact) is deprecated in favor
    # of the ansible_facts[...] form; this is the invoking user's home
    # (e.g. fivin's, once fivin runs this playbook — see fivin.yml).
    home_dir: "{{ ansible_facts['env']['HOME'] }}"

  tasks:
    - name: Require device_type
      ansible.builtin.fail:
        msg: "Pass -e device_type=<hermes-vps> (see vars/profiles.yml)"
      when: device_type is not defined or device_type not in profiles

    - name: Apply role
      ansible.builtin.include_role:
        name: "{{ item }}"
        apply:
          tags: "{{ item }}"
      loop: "{{ profiles['common'] + profiles[device_type] }}"
      tags: always
