---
- name: Remove nvm directory (also removes all Node versions installed via nvm)
  ansible.builtin.file:
    path: "{{ home_dir }}/.nvm"
    state: absent

- name: Check for shell profile files
  ansible.builtin.stat:
    path: "{{ item }}"
  register: nvm_profile_stat
  loop:
    - "{{ home_dir }}/.bashrc"
    - "{{ home_dir }}/.zshrc"
    - "{{ home_dir }}/.profile"

- name: Remove nvm lines from shell profiles
  ansible.builtin.lineinfile:
    path: "{{ item.item }}"
    regexp: "NVM_DIR|nvm\\.sh|bash_completion.*nvm"
    state: absent
  loop: "{{ nvm_profile_stat.results }}"
  when: item.stat.exists
