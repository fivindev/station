---
- name: Install nvm ({{ nvm_version }})
  ansible.builtin.shell: |
    curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/{{ nvm_version }}/install.sh | bash
  args:
    creates: "{{ ansible_env.HOME }}/.nvm/nvm.sh"
    executable: /bin/bash

# nvm's installer already appends the NVM_DIR/sourcing lines to the
# right shell profile (~/.bashrc etc.) — no separate Ansible task needed
# for that part.

- name: Install latest LTS Node.js via nvm
  ansible.builtin.shell: |
    export NVM_DIR="$HOME/.nvm"
    [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
    nvm install --lts
    nvm alias default 'lts/*'
  args:
    executable: /bin/bash
  register: nvm_node_install
  changed_when: "'is already installed' not in nvm_node_install.stdout"
