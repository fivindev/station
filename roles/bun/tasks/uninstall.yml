---
- name: Remove bun install directory
  ansible.builtin.file:
    path: "{{ home_dir }}/.bun"
    state: absent

- name: Check for shell profile files
  ansible.builtin.stat:
    path: "{{ item }}"
  register: bun_profile_stat
  loop:
    - "{{ home_dir }}/.bashrc"
    - "{{ home_dir }}/.zshrc"
    - "{{ home_dir }}/.profile"

- name: Remove bun lines from shell profiles
  ansible.builtin.lineinfile:
    path: "{{ item.item }}"
    regexp: "BUN_INSTALL|\\.bun/bin"
    state: absent
  loop: "{{ bun_profile_stat.results }}"
  when: item.stat.exists
