---
# Maps a device_type (passed via -e device_type=<name>) to the list of
# roles that apply to it. `common` always applies, on top of whichever
# device_type-specific list is selected.
#
# To add a new device type: add a key here, then run with
# -e device_type=<key>.
#
# NOTE: creating a device's admin user (e.g. fivin, for hermes-vps) is
# NOT part of this list — that's a separate, standalone playbook (see
# fivin.yml) run once as root, before site.yml is ever run. site.yml
# itself is meant to be run AS that admin user, not as root — see
# README.md.
profiles:
  common:
    - git
    - gh
    - workspaces

  hermes-vps:
    - docker
    - nvm
    - bun
    - hermes
